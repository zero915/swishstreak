name: Release to Play Store

# Builds a signed Android App Bundle (.aab) and uploads it to the Play Store
# "internal" testing track. Fully free: Expo prebuild + Gradle on GitHub's
# Ubuntu runners (no EAS build quotas).
#
# Trigger by pushing a tag like v1.0.0:
#   git tag v1.0.0 && git push origin v1.0.0
# Or run manually from the Actions tab.
#
# ── Required repo secrets (Settings → Secrets and variables → Actions) ──
#   ANDROID_KEYSTORE_BASE64   base64 of your upload keystore (.jks/.keystore)
#                             create:  keytool -genkeypair -v -keystore upload.keystore \
#                                        -alias upload -keyalg RSA -keysize 2048 -validity 9125
#                             encode:  base64 -w0 upload.keystore   (mac: base64 -i upload.keystore)
#   ANDROID_KEYSTORE_PASSWORD store password for that keystore
#   ANDROID_KEY_ALIAS         key alias (e.g. "upload")
#   ANDROID_KEY_PASSWORD      key password
#   PLAY_SERVICE_ACCOUNT_JSON the Google Play service-account JSON (Play Console →
#                             Setup → API access), with "Release to testing tracks" perms
#   EXPO_PUBLIC_API_URL       production server URL, e.g.
#                             https://game-platform-server.<subdomain>.workers.dev
#   EXPO_PUBLIC_FIREBASE_API_KEY, EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN,
#   EXPO_PUBLIC_FIREBASE_PROJECT_ID, EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET,
#   EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID, EXPO_PUBLIC_FIREBASE_APP_ID
#                             Firebase web config (inlined into the JS bundle at build).
#
# NOTE: the very first upload of a brand-new app must be done manually in the Play
# Console (Google requires the first APK/AAB by hand). After that, this workflow works.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - run: npm install

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Decode upload keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload.keystore"

      - name: Build signed AAB
        working-directory: android
        run: |
          ./gradlew :app:bundleRelease \
            -Pandroid.injected.version.code=${{ github.run_number }} \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/upload.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Upload to Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.bryan.swishstreak
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
